version: "3.9"

services:
  backend:
    build: ./backend
    container_name: smartshield-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=change-this-secret-key-in-production
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: smartshield-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
